name = "intcu"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# KV namespace for room sync (create via: wrangler kv namespace create INTCU_ROOMS)
# Then add the ID below:
# [[kv_namespaces]]
# binding = "INTCU_ROOMS"
# id = "<your-kv-namespace-id>"

# Environment variables (set in Cloudflare Dashboard → Pages → intcu → Settings):
# ANTHROPIC_API_KEY = your Anthropic API key

# Custom domain: intcu.com
# Add via Cloudflare Dashboard → Pages → intcu → Custom domains → intcu.com
