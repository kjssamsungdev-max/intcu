  </style>
  <text x="600" y="280" text-anchor="middle" class="logo" font-size="72" fill="#f4f4f5">INT<tspan fill="#00D4C8">CU</tspan></text>
  <text x="600" y="340" text-anchor="middle" class="sub" font-size="22" fill="#00D4C8" letter-spacing="4">The Intelligent Cue</text>
  <text x="600" y="400" text-anchor="middle" class="sub" font-size="18" fill="#a1a1aa" letter-spacing="1">Speak smarter. Respond instantly.</text>
  <text x="600" y="580" text-anchor="middle" class="sub" font-size="14" fill="#00D4C8" letter-spacing="3" opacity="0.6">intcu.com</text>
