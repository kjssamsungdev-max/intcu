<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09090b"/>
  <!-- Scroll lines background -->
  <line x1="100" y1="200" x2="1100" y2="200" stroke="#00D4C8" stroke-width="1" opacity="0.06"/>
  <line x1="100" y1="260" x2="1100" y2="260" stroke="#00D4C8" stroke-width="1" opacity="0.08"/>
  <line x1="100" y1="320" x2="1100" y2="320" stroke="#00D4C8" stroke-width="1.5" opacity="0.1"/>
  <line x1="100" y1="380" x2="1100" y2="380" stroke="#00D4C8" stroke-width="1" opacity="0.08"/>
  <line x1="100" y1="440" x2="1100" y2="440" stroke="#00D4C8" stroke-width="1" opacity="0.06"/>
  <!-- Guide markers -->
  <rect x="90" y="314" width="8" height="12" rx="2" fill="#00D4C8" opacity="0.3"/>
  <rect x="1102" y="314" width="8" height="12" rx="2" fill="#00D4C8" opacity="0.3"/>
  <style>
    .logo { font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; letter-spacing: 6px; }
